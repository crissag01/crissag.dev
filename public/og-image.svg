<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d001f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="120" fill="#7c3aed" opacity="0.15"/>
  <circle cx="1100" cy="530" r="150" fill="#7c3aed" opacity="0.1"/>

  <!-- Main content -->
  <g filter="url(#glow)">
    <!-- Name -->
    <text x="600" y="240" font-family="Arial, sans-serif" font-size="92" font-weight="bold"
          text-anchor="middle" fill="#ffffff" letter-spacing="-2">
      CRISTOFER AGUILAR
    </text>

    <!-- Title -->
    <text x="600" y="330" font-family="Arial, sans-serif" font-size="56"
          text-anchor="middle" fill="#a78bfa" letter-spacing="2">
      Freelance Developer
    </text>

    <!-- Subtitle -->
    <text x="600" y="400" font-family="Arial, sans-serif" font-size="32"
          text-anchor="middle" fill="#d0d5dd">
      React • Node.js • Automatización • n8n
    </text>
  </g>

  <!-- Bottom line accent -->
  <rect x="300" y="480" width="600" height="3" fill="#7c3aed"/>

  <!-- Website -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="24"
        text-anchor="middle" fill="#9ca3af">
    crissag.dev
  </text>
</svg>