<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="#0a0a15"/>

  <!-- Automation Gears -->
  <!-- Gear 1 (left) -->
  <circle cx="80" cy="80" r="30" fill="none" stroke="url(#grad1)" stroke-width="2"/>
  <circle cx="80" cy="80" r="20" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="80" cy="80" r="8" fill="url(#grad1)"/>

  <!-- Gear teeth left -->
  <rect x="75" y="45" width="10" height="8" fill="url(#grad1)" rx="2"/>
  <rect x="75" y="127" width="10" height="8" fill="url(#grad1)" rx="2"/>
  <rect x="45" y="75" width="8" height="10" fill="url(#grad1)" rx="2"/>
  <rect x="127" y="75" width="8" height="10" fill="url(#grad1)" rx="2"/>

  <!-- Gear 2 (right) -->
  <circle cx="220" cy="80" r="30" fill="none" stroke="url(#grad1)" stroke-width="2"/>
  <circle cx="220" cy="80" r="20" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="220" cy="80" r="8" fill="url(#grad1)"/>

  <!-- Gear teeth right -->
  <rect x="215" y="45" width="10" height="8" fill="url(#grad1)" rx="2"/>
  <rect x="215" y="127" width="10" height="8" fill="url(#grad1)" rx="2"/>
  <rect x="185" y="75" width="8" height="10" fill="url(#grad1)" rx="2"/>
  <rect x="267" y="75" width="8" height="10" fill="url(#grad1)" rx="2"/>

  <!-- Connection line -->
  <line x1="110" y1="80" x2="190" y2="80" stroke="url(#grad1)" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Flow arrows -->
  <path d="M 150 70 L 150 50" stroke="url(#grad1)" stroke-width="2" fill="none" marker-end="url(#arrowup)"/>
  <path d="M 150 90 L 150 110" stroke="url(#grad1)" stroke-width="2" fill="none" marker-end="url(#arrowdown)"/>

  <defs>
    <marker id="arrowup" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="5 0, 10 8, 0 8" fill="url(#grad1)"/>
    </marker>
    <marker id="arrowdown" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 5 8, 10 0" fill="url(#grad1)"/>
    </marker>
  </defs>

  <!-- Process indicators -->
  <text x="150" y="155" text-anchor="middle" fill="url(#grad1)" font-size="12" font-weight="bold">Procesos Automatizados</text>
</svg>
