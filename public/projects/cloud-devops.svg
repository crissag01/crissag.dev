<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="#0a0a15"/>

  <!-- Cloud -->
  <path d="M 60 120 Q 50 100 70 80 Q 90 70 110 80 Q 130 60 150 70 Q 170 60 180 80 Q 200 70 210 100 Q 220 120 200 130 Q 180 140 150 135 Q 120 140 90 130 Q 70 140 60 120"
        fill="none" stroke="url(#grad1)" stroke-width="2"/>

  <!-- Docker container -->
  <rect x="75" y="95" width="35" height="25" fill="url(#grad1)" opacity="0.6" rx="2"/>
  <text x="92" y="113" text-anchor="middle" fill="white" font-size="14" font-weight="bold">D</text>

  <!-- Container 2 -->
  <rect x="120" y="88" width="35" height="25" fill="url(#grad1)" opacity="0.5" rx="2"/>
  <text x="137" y="106" text-anchor="middle" fill="white" font-size="12">⚙</text>

  <!-- Container 3 -->
  <rect x="165" y="95" width="35" height="25" fill="url(#grad1)" opacity="0.6" rx="2"/>
  <text x="182" y="113" text-anchor="middle" fill="white" font-size="14">🔧</text>

  <!-- Infrastructure lines -->
  <line x1="92" y1="140" x2="92" y2="160" stroke="url(#grad1)" stroke-width="1.5"/>
  <line x1="137" y1="133" x2="137" y2="160" stroke="url(#grad1)" stroke-width="1.5"/>
  <line x1="182" y1="140" x2="182" y2="160" stroke="url(#grad1)" stroke-width="1.5"/>

  <!-- Base infrastructure -->
  <rect x="50" y="160" width="200" height="25" fill="none" stroke="url(#grad1)" stroke-width="2" rx="3"/>
  <text x="150" y="177" text-anchor="middle" fill="url(#grad1)" font-size="11" font-weight="bold">VPS • Linux • Docker</text>
</svg>
