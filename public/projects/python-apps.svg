<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="#0a0a15"/>

  <!-- Code Editor Window -->
  <rect x="40" y="30" width="220" height="140" fill="none" stroke="url(#grad1)" stroke-width="2" rx="4"/>

  <!-- Title bar -->
  <rect x="40" y="30" width="220" height="20" fill="url(#grad1)" opacity="0.2" rx="4 4 0 0"/>
  <text x="55" y="44" fill="url(#grad1)" font-size="10" font-weight="bold">python_app.py</text>

  <!-- Window controls -->
  <circle cx="250" cy="40" r="2" fill="#22c55e"/>
  <circle cx="260" cy="40" r="2" fill="#fbbf24"/>
  <circle cx="270" cy="40" r="2" fill="#ef4444"/>

  <!-- Code lines -->
  <text x="55" y="65" fill="url(#grad1)" font-size="9" font-family="monospace">def process_data():</text>
  <text x="55" y="80" fill="#4ade80" font-size="9" font-family="monospace">  return result</text>
  <text x="55" y="95" fill="url(#grad1)" font-size="9" font-family="monospace">if __name__:</text>
  <text x="55" y="110" fill="#4ade80" font-size="9" font-family="monospace">  execute()</text>
  <text x="55" y="125" fill="url(#grad1)" font-size="9" font-family="monospace"># Ready</text>
  <text x="55" y="140" fill="#22c55e" font-size="9" font-family="monospace">✓ Success</text>

  <!-- Python logo -->
  <text x="260" y="120" font-size="45" text-anchor="middle">🐍</text>
</svg>
