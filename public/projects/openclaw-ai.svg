<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="#0a0a15"/>

  <!-- Central Hub -->
  <circle cx="150" cy="100" r="40" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
  <circle cx="150" cy="100" r="25" fill="url(#grad1)"/>
  <text x="150" y="108" text-anchor="middle" fill="white" font-size="24" font-weight="bold">AI</text>

  <!-- Connected Nodes -->
  <!-- Top Left -->
  <circle cx="70" cy="50" r="15" fill="url(#grad2)"/>
  <line x1="130" y1="75" x2="85" y2="60" stroke="url(#grad2)" stroke-width="1.5" opacity="0.5"/>

  <!-- Top Right -->
  <circle cx="230" cy="50" r="15" fill="url(#grad2)"/>
  <line x1="170" y1="75" x2="215" y2="60" stroke="url(#grad2)" stroke-width="1.5" opacity="0.5"/>

  <!-- Bottom Left -->
  <circle cx="70" cy="150" r="15" fill="url(#grad2)"/>
  <line x1="130" y1="125" x2="85" y2="140" stroke="url(#grad2)" stroke-width="1.5" opacity="0.5"/>

  <!-- Bottom Right -->
  <circle cx="230" cy="150" r="15" fill="url(#grad2)"/>
  <line x1="170" y1="125" x2="215" y2="140" stroke="url(#grad2)" stroke-width="1.5" opacity="0.5"/>

  <!-- Icons in nodes -->
  <text x="70" y="56" text-anchor="middle" fill="white" font-size="14">⚙</text>
  <text x="230" y="56" text-anchor="middle" fill="white" font-size="14">🔄</text>
  <text x="70" y="156" text-anchor="middle" fill="white" font-size="14">📊</text>
  <text x="230" y="156" text-anchor="middle" fill="white" font-size="14">🎯</text>
</svg>
