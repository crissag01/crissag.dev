<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="#0a0a15"/>

  <!-- Invoice Document -->
  <rect x="50" y="50" width="80" height="100" fill="none" stroke="url(#grad1)" stroke-width="2" rx="4"/>
  <line x1="55" y1="65" x2="125" y2="65" stroke="url(#grad1)" stroke-width="1" opacity="0.5"/>
  <line x1="55" y1="75" x2="115" y2="75" stroke="url(#grad1)" stroke-width="1" opacity="0.5"/>
  <line x1="55" y1="85" x2="120" y2="85" stroke="url(#grad1)" stroke-width="1" opacity="0.5"/>
  <line x1="55" y1="95" x2="110" y2="95" stroke="url(#grad1)" stroke-width="1" opacity="0.5"/>
  <line x1="55" y1="105" x2="118" y2="105" stroke="url(#grad1)" stroke-width="1" opacity="0.5"/>
  <circle cx="115" cy="130" r="8" fill="url(#grad1)"/>
  <text x="115" y="134" text-anchor="middle" fill="white" font-size="12" font-weight="bold">✓</text>

  <!-- Arrow -->
  <path d="M 140 100 L 160 100" stroke="url(#grad2)" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="url(#grad2)"/>
    </marker>
  </defs>

  <!-- WhatsApp Chat -->
  <rect x="170" y="50" width="80" height="100" fill="none" stroke="url(#grad2)" stroke-width="2" rx="4"/>

  <!-- Chat bubbles -->
  <rect x="175" y="60" width="70" height="15" fill="url(#grad2)" opacity="0.8" rx="3"/>
  <text x="180" y="71" fill="white" font-size="10">Factura 001</text>

  <rect x="175" y="80" width="65" height="15" fill="url(#grad1)" opacity="0.6" rx="3"/>
  <text x="180" y="91" fill="white" font-size="10">$1,200.00</text>

  <rect x="175" y="100" width="70" height="15" fill="url(#grad2)" opacity="0.8" rx="3"/>
  <text x="180" y="111" fill="white" font-size="10">Confirmada</text>

  <!-- WhatsApp icon -->
  <text x="240" y="135" font-size="35" text-anchor="middle">💬</text>
</svg>
